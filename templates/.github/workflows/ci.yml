# CI Pipeline
#
# Runs on every pull request to main. Ensures lint, tests, and builds pass before merge.
#
# [CUSTOMIZE] Replace the job steps with your actual lint, test, and build commands.
# Pin tool versions to avoid CI breakage from upstream updates.

name: CI

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR (saves runner minutes).
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # --- Backend Lint ---
  # Runs ruff for both linting and format checking.
  # [CUSTOMIZE] Replace with your backend linter.
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements*.txt

      - name: Install dependencies
        run: |
          cd apps/backend
          pip install -r requirements-dev.txt

      # Pin ruff version to avoid new rules breaking existing code.
      - name: Lint with ruff
        run: |
          cd apps/backend
          ruff check .
          ruff format --check .

  # --- Frontend Lint ---
  # Runs TypeScript type checking (tsc --noEmit).
  # [CUSTOMIZE] Add ESLint or other frontend linters if used.
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Type check
        run: |
          cd apps/frontend
          npx tsc --noEmit

  # --- Backend Tests ---
  # Runs pytest with a real PostgreSQL database.
  # [CUSTOMIZE] Add any services your tests need (Redis, etc.).
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: beacon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/beacon_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements*.txt

      - name: Install dependencies
        run: |
          cd apps/backend
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          cd apps/backend
          python -m pytest tests/ -v --tb=short

  # --- Frontend Tests ---
  # Runs the frontend test suite (vitest, jest, or playwright -- whatever you use).
  # [CUSTOMIZE] Replace with your frontend test command.
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Run tests
        run: |
          cd apps/frontend
          npm run test

  # --- Docker Build ---
  # Verifies that Docker images build successfully. Does NOT push images.
  # The release workflow (separate file) handles image pushing on merge to main.
  # [CUSTOMIZE] List all services that have Dockerfiles.
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t beacon-backend:ci ./apps/backend

      - name: Build frontend image
        run: docker build -t beacon-frontend:ci ./apps/frontend
